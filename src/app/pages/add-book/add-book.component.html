<h2>Add Book</h2>

<input name="title" [(ngModel)]="title" placeholder="Title"><br><br>

<input name="author" [(ngModel)]="author" placeholder="Author"><br><br>

<textarea name="description" [(ngModel)]="description" placeholder="Description"></textarea><br><br>

<input type="file" (change)="onFileSelected($event)"><br><br>

<button (click)="addBook()">Save</button>

<a routerLink="/list">Back</a>
